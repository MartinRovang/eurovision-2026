<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovision 2026 — Music Video Review Booklets</title>
<style>
  @page {
    size: A4 landscape;
    margin: 8mm;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    font-size: 9px;
    color: #1a1a1a;
    line-height: 1.3;
  }

  .page {
    page-break-after: always;
    width: 100%;
    height: 100%;
    display: flex;
    position: relative;
  }
  .page:last-child { page-break-after: auto; }

  /* Dotted fold line */
  .fold-line {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    border-left: 2px dashed #bbb;
    z-index: 10;
  }
  .fold-label {
    position: absolute;
    left: 50%;
    top: 4px;
    transform: translateX(-50%);
    background: #fff;
    color: #aaa;
    font-size: 7px;
    padding: 1px 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 11;
  }

  /* LEFT HALF = content (inside when folded) */
  .content-panel {
    width: 50%;
    padding: 8px 14px 8px 8px;
    overflow: hidden;
  }

  /* RIGHT HALF = cover (front when folded) */
  .cover-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    border-left: none;
    background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 40%, #2d1b69 100%);
    color: #fff;
  }
  .cover-flag {
    font-size: 64px;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .cover-country {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .cover-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f0c040, transparent);
    margin: 8px auto;
  }
  .cover-type {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f0c040;
    margin-bottom: 4px;
  }
  .cover-subtitle {
    font-size: 9px;
    color: #aab;
    font-style: italic;
    margin-top: 4px;
  }
  .cover-year {
    font-size: 42px;
    font-weight: 200;
    color: rgba(255,255,255,0.12);
    position: absolute;
    bottom: 16px;
    right: 30px;
    letter-spacing: 4px;
  }
  .cover-stars {
    color: #f0c040;
    font-size: 14px;
    letter-spacing: 6px;
    margin-top: 12px;
  }

  /* Info table */
  .info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 5px;
    font-size: 8.5px;
  }
  .info-table td {
    padding: 2px 5px;
    border: 1px solid #ccc;
  }
  .info-table td:first-child {
    font-weight: bold;
    width: 55px;
    background: #f5f5f5;
    font-size: 8px;
  }

  /* Section headers */
  .content-panel h2 {
    font-size: 9px;
    background: #1a1a2e;
    color: #fff;
    padding: 2px 6px;
    margin: 4px 0 3px;
    letter-spacing: 0.5px;
  }

  /* Checklist */
  .checklist {
    columns: 2;
    column-gap: 10px;
    margin-bottom: 3px;
  }
  .checklist-section {
    break-inside: avoid;
    margin-bottom: 3px;
  }
  .checklist-section h3 {
    font-size: 8.5px;
    border-bottom: 0.5px solid #999;
    padding-bottom: 0.5px;
    margin-bottom: 1.5px;
    color: #333;
  }
  .checklist-section label {
    display: block;
    padding: 0.5px 0;
    font-size: 8px;
  }
  .checklist-section label::before {
    content: "\2610";
    margin-right: 3px;
    font-size: 9px;
  }

  /* Notes */
  .notes-box {
    border: 1px solid #bbb;
    min-height: 28px;
    padding: 2px 4px;
    margin-bottom: 3px;
    font-style: italic;
    color: #bbb;
    font-size: 7px;
  }

  /* Rating table */
  .rating-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 8px;
    margin-bottom: 3px;
  }
  .rating-table th, .rating-table td {
    border: 1px solid #ccc;
    padding: 1.5px 4px;
    text-align: center;
  }
  .rating-table th {
    background: #f0f0f0;
    text-align: left;
    font-size: 7.5px;
  }
  .rating-table td:last-child { width: 50px; }
  .rating-table tr:last-child { font-weight: bold; background: #f9f9f9; }

  .winner-row {
    font-size: 8px;
    text-align: center;
    padding: 2px;
    border: 1px solid #ccc;
    background: #fafafa;
  }
  .winner-row span { margin: 0 4px; }

  @media print {
    .page { page-break-after: always; }
    .page:last-child { page-break-after: auto; }
    .fold-line { border-left-color: #ccc; }
  }
</style>
</head>
<body>

</body>
</html>
